<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velox</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
padding:50px;
}

.container{
max-width:900px;
margin:auto;
}

.logo{
font-size:72px;
font-weight:700;
text-align:center;
margin-bottom:10px;
}

.logo span{
color:#38bdf8;
}

.subtitle{
text-align:center;
opacity:.7;
margin-bottom:30px;
}

.search{
display:flex;
gap:10px;
}

input{
flex:1;
padding:18px;
border:none;
border-radius:999px;
background:rgba(255,255,255,.08);
color:white;
font-size:18px;
outline:none;
}

button{
padding:18px 28px;
border:none;
border-radius:999px;
background:#38bdf8;
font-weight:700;
cursor:pointer;
}

.results{
margin-top:30px;
}

.card{
background:rgba(255,255,255,.06);
padding:20px;
border-radius:18px;
margin-bottom:15px;
}

.card h3{
color:#38bdf8;
margin-bottom:8px;
}

.noresults{
opacity:.6;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
Ve<span>lox</span>
</div>

<div class="subtitle">
Search inside Velox
</div>

<div class="search">

<input
id="query"
placeholder="Search anything..."
>

<button onclick="searchSite()">
Search
</button>

</div>

<div
class="results"
id="results">

</div>

</div>

<script>

// YOUR SEARCH DATABASE

const pages = [

{
title:"Home",
content:"Welcome to Velox search engine homepage"
},

{
title:"About",
content:"Velox is a fast search experience built with HTML CSS and JavaScript"
},

{
title:"News",
content:"Technology AI gaming science updates"
},

{
title:"Images",
content:"Photo gallery wallpapers artwork"

},

{
title:"Help",
content:"Search for pages and information inside Velox"

}

];

function searchSite(){

const q =
document
.getElementById("query")
.value
.toLowerCase()
.trim();

const results =
document
.getElementById("results");

results.innerHTML="";

if(!q){
return;
}

const matches =
pages.filter(page=>

page.title
.toLowerCase()
.includes(q)

||

page.content
.toLowerCase()
.includes(q)

);

if(matches.length===0){

results.innerHTML=
`
<div class="card noresults">
No results found.
</div>
`;

return;

}

matches.forEach(page=>{

results.innerHTML +=

`
<div class="card">

<h3>${page.title}</h3>

<p>${page.content}</p>

</div>
`;

});

}

document
.getElementById("query")
.addEventListener(
"keydown",
e=>{
if(e.key==="Enter"){
searchSite();
}
}
);

</script>

</body>
</html>
